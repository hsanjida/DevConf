<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>DevConf</title>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <img src="./assets/logo.png" alt="logo">
            </div>
            <div class="menu">
                <ul>
                    <li>Speakers</li>
                    <li>Schedule</li>
                    <li>Tracks</li>
                    <li>Venue</li>
                    <li>Blog</li>
                </ul>
            </div>
            <button class="btn">
                Register Now
            </button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Code. Connect. Create</h1>
                <p>
                  Join 4,000+ engineers, founders, and builders at the premier developer conference of 2026. Three days of cutting-edge talks, hands-on workshops, and meaningful connections.  
                </p>
            </div>
            <button class="btn" id="hero-btn">Register Now</button>
        </section>
    </main>
</body>
</html>
